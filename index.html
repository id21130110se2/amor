<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Para Mi Princesa ❤️</title>

    <!-- FUENTE -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- PARTICULAS -->

    <div class="particles"></div>

    <!-- HERO -->

    <section class="hero">

        <div class="glass">

            <h1 class="title">
                TE AMO ❤️
            </h1>

            <p class="subtitle">
                Eres la persona más especial de mi vida ✨
            </p>

            <button id="loveButton">
                Presiona Aquí 💖
            </button>

        </div>

    </section>

    <!-- CARTA -->

    <section
        class="message-box hidden"
        id="messageBox">

        <div class="card">

            <h2>
                💌 Para Ti 💌
            </h2>

            <p>
                Gracias por existir,
                por iluminar mi vida
                y hacer que cada momento
                contigo sea mágico.
            </p>

            <p>
                Tu sonrisa es mi lugar favorito ❤️
            </p>

        </div>

    </section>

    <!-- GALERIA -->

    <section class="gallery">

        <h2>
            Nuestros Momentos 📸
        </h2>

        <div class="images">

            <div class="image-card">
                <img src="foto1.jpeg" alt="">
            </div>

            <div class="image-card">
                <img src="foto2.jpeg" alt="">
            </div>

            <div class="image-card">
                <img src="foto3.jpeg" alt="">
            </div>

        </div>

    </section>

    <!-- MUSICA -->

    <section class="music-section">

        <h2>
            ❤️ Nuestra Canción ❤️
        </h2>

        <audio id="music" controls>

            <source src="heavenly.mp3"
                type="audio/mpeg">

        </audio>

    </section>

    <!-- FOOTER -->

    <footer>

        Hecho con mucho amor ❤️

    </footer>

    <!-- SCRIPT -->

    <script>

        const button =
            document.getElementById('loveButton');

        const messageBox =
            document.getElementById('messageBox');

        button.addEventListener('click', () => {

            messageBox.classList.toggle('show');

            createHearts();

        });

        function createHearts() {

            for (let i = 0; i < 40; i++) {

                const heart =
                    document.createElement("div");

                heart.classList.add("heart");

                heart.innerHTML = "❤️";

                heart.style.left =
                    Math.random() * 100 + "vw";

                heart.style.animationDuration =
                    Math.random() * 3 + 2 + "s";

                document.body.appendChild(heart);

                setTimeout(() => {

                    heart.remove();

                }, 5000);

            }

        }

    </script>

</body>

</html>
